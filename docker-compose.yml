services:
  live-action:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: live-action
    ports:
      - "8000:8000"
    environment:
      - LIVE_ACTION_API_KEY=${LIVE_ACTION_API_KEY:-}
      - LIVE_ACTION_PRECISION=${LIVE_ACTION_PRECISION:-bf16}
      - LIVE_ACTION_PROVISIONING__AUTO_SYNC_ON_STARTUP=${LIVE_ACTION_PROVISIONING__AUTO_SYNC_ON_STARTUP:-false}
      - LIVE_ACTION_PROVISIONING__HUGGINGFACE__ENABLED=${LIVE_ACTION_PROVISIONING__HUGGINGFACE__ENABLED:-false}
      - LIVE_ACTION_PROVISIONING__HUGGINGFACE__TOKEN=${LIVE_ACTION_PROVISIONING__HUGGINGFACE__TOKEN:-}
      - LIVE_ACTION_PROVISIONING__HUGGINGFACE__CACHE_DIR=${LIVE_ACTION_PROVISIONING__HUGGINGFACE__CACHE_DIR:-artifacts/huggingface}
      - LIVE_ACTION_PROVISIONING__HUGGINGFACE__LOCAL_DIR=${LIVE_ACTION_PROVISIONING__HUGGINGFACE__LOCAL_DIR:-models}
    volumes:
      - ./:/workspace
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

